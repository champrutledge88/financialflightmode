<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found | Financial Flight Mode</title>
  <style>
    :root {
      --black: #050505;
      --charcoal: #0B0B0B;
      --orange: #E95C03;
      --white: #F5F2EB;
      --muted: #8D8D8D;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--black);
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
    }
    main {
      width: min(92vw, 560px);
      padding: 48px 32px;
      background: var(--charcoal);
      border: 1px solid #1a1a1a;
    }
    .eyebrow {
      color: var(--orange);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    h1 {
      margin: 14px 0 12px;
      font-size: clamp(36px, 8vw, 72px);
      line-height: 0.95;
      text-transform: uppercase;
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      background: var(--orange);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Financial Flight Mode</div>
    <h1>Page Not Found</h1>
    <p>This page is not available. Return to the main Financial Flight Mode page to continue.</p>
    <a href="/">Return Home</a>
  </main>
</body>
</html>
